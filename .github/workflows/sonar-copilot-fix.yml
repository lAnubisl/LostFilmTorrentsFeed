name: Fix SonarQube issues with Copilot

on:
  workflow_dispatch:
    inputs:
      max_issues:
        description: Maximum issues to fix
        default: "10"

permissions:
  contents: write
  pull-requests: write

jobs:
  fix:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Fix SonarQube issues
        uses: lAnubisl/SonarQubeIssuesAIResolutionAction@main
        with:
          sonar_host_url: https://sonarcloud.io
          sonar_project_key: lAnubisl_LostFilmTorrentsFeed
          sonar_branch: master
          max_issues: ${{ inputs.max_issues }}
          copilot_allow_all_tools: true
          copilot_extra_instructions: |
            Make sure `dotnet build` command reports no errors or failures after the fixes (otherwise fix them).
            Make sure `dotnet test` command reports no errors or failures after the fixes (otherwise fix them).
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          COPILOT_CLI_TOKEN: ${{ secrets.COPILOT_CLI_TOKEN }}
          GH_CLI_TOKEN: ${{ secrets.GH_CLI_TOKEN }}